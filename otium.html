---
layout: default
title: Otium
---
<h1 id="otium"><a href="#otium">Otium (Blog)</a></h1>
  
<p>Welcome to my blog! Here I write about my thoughts, academic topics, multimodal AI, and other musings.</p>

<ul class="blog-list" style="list-style-type: none; padding-left: 0;">
  {% for post in site.posts %}
    <li style="margin-bottom: 10px;">
      <span style="display:inline-block; width: 100px; color: #666;"><i>{{ post.date | date: "%Y-%m-%d" }}</i></span>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </li>
  {% else %}
    <li><em>No posts yet.</em></li>
  {% endfor %}
</ul>
